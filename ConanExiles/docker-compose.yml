services:
  conanexiles:
    build: .
    container_name: conanexiles
    restart: unless-stopped

    ports:
      - "7777:7777/udp"
      - "7778:7778/udp"
      - "27015:27015/udp"

    volumes:
      - /srv/data/games/ConanExiles/install:/home/steam

    mem_limit: 12g
    stop_grace_period: 2m
